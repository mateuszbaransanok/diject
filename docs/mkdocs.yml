site_name: diject

nav:
  - Home: index.md
  - About: about.md
  - API Reference: api.md

theme: readthedocs
#theme: material

docs_dir: pages/
site_dir: build/

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ".."
          options:
            allow_inspection: true
            show_source: false
#            show_signature: true
#            separate_signature: true
            docstring_style: google
            show_root_heading: true
            heading_level: 2
#            members_order: alphabetical
            show_if_no_docstring: false
            inherited_members: false
